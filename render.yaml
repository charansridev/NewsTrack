services:
  # -------------------------
  # PostgreSQL Database
  # -------------------------
  - type: psql
    name: newstrack-db
    plan: free # Change to standard if free tier is unavailable or you need more resources
    databaseName: newstrack
    user: newstrack_user

  # -------------------------
  # FastAPI Backend
  # -------------------------
  - type: web
    name: newstrack-api
    env: python
    region: oregon # or frankfurt, ohio, singapore
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: newstrack-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "https://newstrack-frontend.onrender.com" # Replace with your frontend's deployed URL
      - key: USER_JWT_SECRET
        generateValue: true
      - key: DRIVER_JWT_SECRET
        generateValue: true
      - key: ENABLE_BACKGROUND_JOBS
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.9"

  # -------------------------
  # Vite + React Frontend
  # -------------------------
  - type: web
    name: newstrack-frontend
    env: static
    region: oregon
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://newstrack-api.onrender.com/v1" # Replace with your actual backend URL if you use a custom domain
      - key: VITE_WS_URL
        value: "wss://newstrack-api.onrender.com/v1"
      - key: NODE_VERSION
        value: "20.11.0"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
